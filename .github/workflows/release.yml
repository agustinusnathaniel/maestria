name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - '**/CHANGELOG.md'
      - '**/package.json'
      - '.github/workflows/release.yml'
      - '.vite-hooks/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_GIT_HOOKS: '0'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Generate Astro types
        run: pnpm sync:docs

      - name: Check (format + lint + typecheck + test) and Build
        run: pnpm check

      # Note: The `if: github.ref == 'refs/heads/main'` guard was intentionally
      # removed — this workflow only triggers on main pushes. If adding a new
      # trigger (e.g., pull_request), re-add the guard to prevent accidental
      # publishing.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
