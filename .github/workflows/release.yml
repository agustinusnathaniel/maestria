name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - '**/CHANGELOG.md'
      - '**/package.json'
      - '.github/workflows/release.yml'
      - '.vite-hooks/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write
  actions: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_GIT_HOOKS: '0'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm build:ci
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if kimi-code was published
        id: check-kimi
        run: |
          JSON='${{ steps.changesets.outputs.publishedPackages }}'
          if [ -z "$JSON" ] || [ "$JSON" = "null" ]; then
            echo "kimi_published=0" >> "$GITHUB_OUTPUT"
          else
            echo "kimi_published=$(echo "$JSON" | jq -r 'map(select(.name == "@maestria/kimi-code")) | length')" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger kimi-code release
        if: steps.check-kimi.outputs.kimi_published != '0'
        continue-on-error: true
        run: gh workflow run release-kimi-code.yml --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
