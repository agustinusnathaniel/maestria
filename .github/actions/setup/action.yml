name: 'Maestria Setup'
description: 'Install dependencies with pnpm, setup Python, restore vp task cache'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.node-version'
    - uses: actions/setup-python@v5
      with:
        python-version-file: 'packages/hermes/pyproject.toml'
    - uses: pnpm/setup@v1
      with:
        cache: true
    - name: Restore vp task cache
      uses: actions/cache@v6
      with:
        path: node_modules/.vite/task-cache
        key: vp-task-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          vp-task-cache-${{ runner.os }}-
